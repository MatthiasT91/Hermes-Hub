services:
  hermes-hub:
    build: .
    container_name: hermes-hub
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

  tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    network_mode: service:hermes-hub
    env_file:
      - .env
    command: tunnel --no-autoupdate run
